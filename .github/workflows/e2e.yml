name: Pruebas E2E Cypress - SQA

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: elpepe123
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v4

      - name: Checkout Backend Code
        uses: actions/checkout@v4
        with:
          repository: Mora-J/stock-simulator-spring-SQA
          path: backend-repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Spring Boot Backend
        working-directory: ./backend-repo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: elpepe123
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests spring-boot:run > backend.log 2>&1 &
          echo "Esperando a que el backend inicie..."
          for i in $(seq 1 60); do
            if curl --silent --fail http://localhost:8080/api/user/all > /dev/null 2>&1; then
              echo "¡Backend operativo!"
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          echo "Backend no arrancó en el tiempo esperado"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Save Pipeline Start Timestamp
        run: |
          mkdir -p reports
          date +%s > reports/pipeline-start.txt

      # Ejecuta Cypress de forma nativa guardando el reporte exacto en disco
      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 120
          browser: chrome
          # Configuramos mochawesome de forma nativa mediante la acción
          reporter: mochawesome
          reporter-options: reportDir=reports,reportFilename=cypress-report,html=false,json=true,overwrite=true

      - name: Generate Frontend Metrics
        run: npm run frontend-metrics

      # Removido el duplicado y configurado el cargador de artefactos seguro
      - name: Upload Cypress and Metrics Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-metrics
          path: |
            reports/cypress-report.json
            reports/frontend-metrics-governance.json
            reports/frontend-metrics-governance.csv
            reports/pipeline-start.txt