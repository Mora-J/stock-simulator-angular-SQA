name: Pruebas E2E Cypress - SQA

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: elpepe123
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Frontend Code
        uses: actions/checkout@v4

      - name: Checkout Backend Code
        uses: actions/checkout@v4
        with:
          repository: Mora-J/stock-simulator-spring-SQA
          path: backend-repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Spring Boot Backend
        working-directory: ./backend-repo
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: elpepe123
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests spring-boot:run > backend.log 2>&1 &
          echo "Esperando a que el backend inicie..."
          for i in $(seq 1 60); do
            if curl --silent --fail http://localhost:8080/api/user/all > /dev/null 2>&1; then
              echo "¡Backend operativo!"
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          echo "Backend no arrancó en el tiempo esperado"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Save Pipeline Start Timestamp
        run: |
          mkdir -p reports
          date +%s > reports/pipeline-start.txt

      - name: Start Frontend Server
        run: |
          mkdir -p reports
          npm run start -- --host 0.0.0.0 --port 4200 > reports/frontend-server.log 2>&1 &
          echo $! > reports/frontend-server.pid
          for i in $(seq 1 60); do
            if curl --silent --fail http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend listo"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend no arrancó en 120s"
          cat reports/frontend-server.log
          exit 1

      - name: Run Cypress E2E Tests
        run: |
          mkdir -p reports
          npx cypress run \
            --reporter mochawesome \
            --reporter-options reportDir=reports,reportFilename=cypress-report,json=true,html=false,overwrite=false,timestamps=false \
            --spec "cypress/e2e/**/*.cy.js" \
            --browser chrome
          echo "REPORTS DIR CONTENTS:"
          find reports -maxdepth 1 -type f | sort

          - name: Merge Cypress mochawesome JSON reports
        if: always()
        run: |
          mkdir -p reports
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const reportsDir = path.resolve('reports');
          const files = fs.readdirSync(reportsDir)
            .filter(f => f.startsWith('cypress-report') && f.endsWith('.json'));

          if (files.length === 0) {
            console.error('No se encontraron reportes JSON de mochawesome en reports/');
            process.exit(1);
          }

          const merged = {
            stats: {
              suites: 0,
              tests: 0,
              passes: 0,
              pending: 0,
              failures: 0,
              skipped: 0,
              duration: 0,
              testsRegistered: 0,
              start: null,
              end: null
            },
            results: []
          };

          for (const file of files) {
            const report = JSON.parse(fs.readFileSync(path.join(reportsDir, file), 'utf8'));
            const stats = report.stats || {};

            merged.stats.suites += Number(stats.suites ?? 0);
            merged.stats.tests += Number(stats.tests ?? 0);
            merged.stats.passes += Number(stats.passes ?? 0);
            merged.stats.pending += Number(stats.pending ?? 0);
            merged.stats.failures += Number(stats.failures ?? 0);
            merged.stats.skipped += Number(stats.skipped ?? 0);
            merged.stats.duration += Number(stats.duration ?? 0);
            merged.stats.testsRegistered += Number(stats.testsRegistered ?? 0);

            if (stats.start) {
              const startTime = new Date(stats.start).getTime();
              if (!merged.stats.start || startTime < new Date(merged.stats.start).getTime()) {
                merged.stats.start = stats.start;
              }
            }
            if (stats.end) {
              const endTime = new Date(stats.end).getTime();
              if (!merged.stats.end || endTime > new Date(merged.stats.end).getTime()) {
                merged.stats.end = stats.end;
              }
            }

            if (Array.isArray(report.results)) {
              merged.results.push(...report.results);
            }
          }

          fs.writeFileSync(path.join(reportsDir, 'cypress-report-merged.json'), JSON.stringify(merged, null, 2), 'utf8');
          console.log('Merged reports:', files.join(', '));
          NODE

      - name: Generate Frontend Metrics
        run: npm run frontend-metrics

      - name: Upload Cypress and Metrics Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-metrics
          path: |
            reports/cypress-report-merged.json
            reports/cypress-report*.json
            reports/frontend-metrics-governance.json
            reports/frontend-metrics-governance.csv
            reports/frontend-server.log
            reports/frontend-server.pid
            cypress/screenshots/**
            cypress/videos/**

      